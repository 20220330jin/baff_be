spring:
  profiles:
    active: local

# 리워드/환전 기능 (기본 비활성화 -- 운영 무영향)
changeup:
  reward:
    enabled: false

reward:
  dummy-mode: false

# 토스 API (Render 운영용 — application-local.yml은 .gitignore이므로 main yml에 명시)
toss:
  api:
    url: https://apps-in-toss-api.toss.im
  cert-path: classpath:cert/changeup_public.crt
  key-path: classpath:cert/changeup_private.key
  promotion:
    exchange-code: "01KJ54B2MP0ZC1KSYZ9Y7TWGV9"
  # 토스 unlink 콜백 Basic Auth (콘솔 "연결 끊기 콜백 정보 > Basic Auth 헤더"와 일치해야 함).
  # 운영은 환경변수(TOSS_UNLINK_USERNAME / TOSS_UNLINK_PASSWORD)로 주입 권장.
  unlink:
    username: ${TOSS_UNLINK_USERNAME:changeup_toss}
    password: ${TOSS_UNLINK_PASSWORD:testD123!@}

# AI 분석 (기본 비활성 -- application-local.yml에서 키 설정)
ai:
  claude:
    api-key: ""
    base-url: https://api.anthropic.com/v1
    model-haiku: claude-haiku-4-5-20251001
    model-sonnet: claude-sonnet-4-5-20241022